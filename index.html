<audio id="tickSound" src="https://www.myinstants.com/media/sounds/roulette.mp3"></audio>

<script>
let girando = false;

const premios = [
  "5", "10", "0", "25", "50", "1",
  "5", "20", "100", "15", "5", "10"
];

function girar() {
  if (girando) return;

  girando = true;

  const ruleta = document.getElementById("ruleta");
  const resultado = document.getElementById("resultado");
  const flecha = document.querySelector(".flecha");
  const sonido = document.getElementById("tickSound");

  flecha.classList.add("rebotando");

  let grados = 0;
  let velocidad = 30; // velocidad inicial
  let desaceleracion = 0.97; // qué tan rápido frena
  let angulo = 0;

  function animar() {
    if (velocidad > 0.5) {
      grados += velocidad;
      velocidad *= desaceleracion;

      ruleta.style.transform = `rotate(${grados}deg)`;

      // 🎯 DETECTAR CAMBIO DE SECTOR (TIC)
      let nuevoAngulo = Math.floor((grados % 360) / (360 / premios.length));

      if (nuevoAngulo !== angulo) {
        angulo = nuevoAngulo;

        // sonido
        sonido.currentTime = 0;
        sonido.play();

        // pequeño golpe visual
        flecha.style.transform = "translateX(-50%) rotate(15deg)";
        setTimeout(() => {
          flecha.style.transform = "translateX(-50%) rotate(0deg)";
        }, 50);
      }

      requestAnimationFrame(animar);
    } else {
      terminar();
    }
  }

  function terminar() {
    let anguloFinal = grados % 360;
    let sector = Math.floor((360 - anguloFinal) / (360 / premios.length));

    let premio = premios[sector];
    resultado.innerText = "Resultado: " + premio;

    flecha.classList.remove("rebotando");
    girando = false;
  }

  animar();
}
</script>
