<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ruleta</title>

<style>
body {
  margin: 0;
  background: #1a1a1a;
  color: white;
  font-family: Arial;

  display: grid;
  place-items: center;
  height: 100vh;
}

/* CONTENEDOR GENERAL */
.game {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}

/* RULETA */
.ruleta-container {
  position: relative;
  width: 400px;
  height: 400px;
}

.ruleta {
  width: 100%;
  height: 100%;
  border-radius: 50%;
  border: 12px solid gold;
  box-shadow: 0 0 20px gold;

  background: conic-gradient(
    #ff3c00 0deg 30deg,
    #ffd966 30deg 60deg,
    #ff3c00 60deg 90deg,
    #ffd966 90deg 120deg,
    #ff3c00 120deg 150deg,
    #ffd966 150deg 180deg,
    #ff3c00 180deg 210deg,
    #ffd966 210deg 240deg,
    #ff3c00 240deg 270deg,
    #ffd966 270deg 300deg,
    #ff3c00 300deg 330deg,
    #ffd966 330deg 360deg
  );

  transition: transform 4s cubic-bezier(0.1, 0.7, 0.1, 1);
}

/* FLECHA REAL */
.flecha {
  position: absolute;
  top: -15px;
  left: 50%;
  transform: translateX(-50%);
  width: 0;
  height: 0;

  border-left: 15px solid transparent;
  border-right: 15px solid transparent;
  border-top: 25px solid white;

  z-index: 10;
}

/* ANIMACIÓN DE REBOTE */
@keyframes vibrar {
  0% { transform: translateX(-50%) rotate(0deg); }
  25% { transform: translateX(-50%) rotate(10deg); }
  50% { transform: translateX(-50%) rotate(-10deg); }
  75% { transform: translateX(-50%) rotate(6deg); }
  100% { transform: translateX(-50%) rotate(0deg); }
}

.flecha.rebotando {
  animation: vibrar 0.15s linear infinite;
}

/* BOTÓN */
button {
  padding: 12px 25px;
  font-size: 18px;
  background: gold;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: orange;
}
</style>
</head>

<body>

<div class="game">
  <h1>🎰 Ruleta</h1>

  <div class="ruleta-container">
    <div class="flecha"></div>
    <div id="ruleta" class="ruleta"></div>
  </div>

  <button onclick="girar()">Girar</button>
  <h2 id="resultado"></h2>
</div>

<script>
let girando = false;

const premios = [
  "5", "10", "0", "25", "50", "1",
  "5", "20", "100", "15", "5", "10"
];

function girar() {
  if (girando) return;

  girando = true;

  const ruleta = document.getElementById("ruleta");
  const resultado = document.getElementById("resultado");
  const flecha = document.querySelector(".flecha");

  // activar vibración
  flecha.classList.add("rebotando");

  let random = Math.floor(Math.random() * 360);
  let vueltas = 5 * 360;
  let rotacion = vueltas + random;

  ruleta.style.transform = `rotate(${rotacion}deg)`;

  setTimeout(() => {
    let anguloFinal = rotacion % 360;
    let sector = Math.floor((360 - anguloFinal) / (360 / premios.length));

    let premio = premios[sector];

    resultado.innerText = "Resultado: " + premio;

    // detener vibración
    flecha.classList.remove("rebotando");

    girando = false;
  }, 4000);
}
</script>

</body>
</html>
